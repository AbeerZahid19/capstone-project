<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>User Settings</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <main class="page">
      <section class="card" aria-labelledby="settings-heading">
        <h1 id="settings-heading">User Settings</h1>
        <p class="subtitle">Update your profile and appearance preferences.</p>

        <div
          id="form-status"
          class="form-status"
          role="status"
          aria-live="polite"
          aria-atomic="true"
        ></div>

        <form id="settings-form" novalidate>
          <div class="form-field">
            <label for="first-name">First Name</label>
            <input
              type="text"
              id="first-name"
              name="firstName"
              autocomplete="given-name"
              required
              aria-describedby="first-name-error"
              aria-invalid="false"
            />
            <p id="first-name-error" class="field-error" role="alert" aria-live="polite"></p>
          </div>

          <div class="form-field">
            <label for="last-name">Last Name</label>
            <input
              type="text"
              id="last-name"
              name="lastName"
              autocomplete="family-name"
              required
              aria-describedby="last-name-error"
              aria-invalid="false"
            />
            <p id="last-name-error" class="field-error" role="alert" aria-live="polite"></p>
          </div>

          <div class="form-field">
            <label for="email">Email</label>
            <input
              type="email"
              id="email"
              name="email"
              autocomplete="email"
              required
              aria-describedby="email-error"
              aria-invalid="false"
            />
            <p id="email-error" class="field-error" role="alert" aria-live="polite"></p>
          </div>

          <div class="form-field">
            <label for="theme">Theme Preference</label>
            <select
              id="theme"
              name="theme"
              required
              aria-describedby="theme-error"
              aria-invalid="false"
            >
              <option value="">Select a theme</option>
              <option value="system">System</option>
              <option value="light">Light</option>
              <option value="dark">Dark</option>
            </select>
            <p id="theme-error" class="field-error" role="alert" aria-live="polite"></p>
          </div>

          <div class="form-actions">
            <button type="submit">Save Settings</button>
          </div>
        </form>
      </section>
    </main>

    <script src="js/validation.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
